name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  test:
    name: Lint, test and smoke
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Lint (flake8)
        run: |
          pip install flake8
          flake8 backend

      - name: Run unit tests (if any)
        run: |
          pip install pytest
          pytest -q

      - name: Smoke test (import backend without MLflow)
        env:
          USE_MLFLOW: "false"
        run: |
          python - <<'PY'
          import os
          os.environ['USE_MLFLOW'] = 'false'
          # Import and call load_resources to detect import/runtime errors
          try:
              from backend.core import ai_engine
              ai_engine.load_resources()
              print('SMOKE_OK')
          except Exception as e:
              print('SMOKE_FAIL', e)
              raise
          PY
